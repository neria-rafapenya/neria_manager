spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/provider_manager}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS:true}

mail:
  from: ${MAIL_FROM:no-reply@presupuestos.local}

server:
  port: ${PORT:8081}

security:
  jwt:
    secret: ${JWT_SECRET:change_me}
    issuer: ${JWT_ISSUER:presupuestos}
    expirationMinutes: ${JWT_EXPIRATION_MINUTES:120}

openai:
  apiKey: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  baseUrl: ${OPENAI_BASE_URL:https://api.openai.com/v1}

cloudinary:
  cloudName: ${CLOUDINARY_CLOUD_NAME:}
  apiKey: ${CLOUDINARY_API_KEY:}
  apiSecret: ${CLOUDINARY_API_SECRET:}
  folder: ${CLOUDINARY_FOLDER:presupuestos}

presupuestos:
  tenant:
    header: ${TENANT_HEADER:X-Tenant-Id}
  auth:
    masterPassword: ${MASTER_PASSWORD:}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:false}
    defaults:
      capacity: ${RATE_LIMIT_DEFAULT_CAPACITY:120}
      refillTokens: ${RATE_LIMIT_DEFAULT_TOKENS:120}
      refillPeriodSeconds: ${RATE_LIMIT_DEFAULT_PERIOD:60}
    ai:
      capacity: ${RATE_LIMIT_AI_CAPACITY:30}
      refillTokens: ${RATE_LIMIT_AI_TOKENS:30}
      refillPeriodSeconds: ${RATE_LIMIT_AI_PERIOD:60}
